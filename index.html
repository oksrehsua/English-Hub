<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Learning Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Yusei+Magic&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #e95c8b;
            --secondary: #6c5ce7;
            --bg: #f8f9fa;
            --text: #1a1a1a;
            --card-bg: #ffffff;
            --border: #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image: radial-gradient(#dcdde1 1px, transparent 1px);
            background-size: 32px 32px;
        }

        .hub-container {
            max-width: 1000px;
            width: 100%;
            text-align: center;
        }

        header {
            margin-bottom: 60px;
        }

        h1 {
            font-family: "Yusei Magic", sans-serif;
            font-size: clamp(3rem, 10vw, 5rem);
            color: var(--primary);
            text-shadow: 3px 3px 0 var(--border), 6px 6px 0 var(--border);
            line-height: 1.1;
            margin-bottom: 15px;
        }

        .subtitle {
            font-size: 1.2rem;
            font-weight: 600;
            color: #555;
            letter-spacing: 0.1em;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            margin-top: 40px;
        }

        .tool-card {
            background: var(--card-bg);
            border: 4px solid var(--border);
            border-radius: 32px;
            padding: 48px 32px;
            text-decoration: none;
            color: var(--text);
            box-shadow: 12px 12px 0 var(--border);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .tool-card:hover {
            transform: translate(-4px, -4px);
            box-shadow: 16px 16px 0 var(--border);
        }

        .tool-card:active {
            transform: translate(4px, 4px);
            box-shadow: 4px 4px 0 var(--border);
        }

        .tool-icon {
            font-size: 4rem;
            margin-bottom: 24px;
            display: block;
        }

        .tool-title {
            font-family: "Yusei Magic", sans-serif;
            font-size: 2.2rem;
            margin-bottom: 16px;
        }

        .tool-desc {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #444;
            font-weight: 600;
        }

        .tool-card.triple-echo .tool-title { color: var(--primary); }
        .tool-card.english-reader .tool-title { color: var(--secondary); }

        .btn-enter {
            margin-top: 32px;
            padding: 12px 32px;
            background: var(--border);
            color: white;
            border-radius: 50px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.2s;
        }

        .tool-card:hover .btn-enter {
            background: var(--primary);
            transform: scale(1.05);
        }

        .tool-card.english-reader:hover .btn-enter {
            background: var(--secondary);
        }

        footer {
            margin-top: 80px;
            font-size: 0.9rem;
            font-weight: 700;
            color: #888;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.8rem; }
            .cards-grid { gap: 30px; }
            .tool-card { padding: 32px 24px; }
        }
    </style>
</head>
<body>
    <div class="hub-container">
        <header>
            <h1>English Hub</h1>
            <p class="subtitle">英語学習をもっと楽しく、もっと効率的に。</p>
        </header>

        <div class="cards-grid">
            <a href="triple-echo/index.html" class="tool-card triple-echo">
                <span class="tool-icon">🔊</span>
                <h2 class="tool-title">TRIPLE ECHO</h2>
                <p class="tool-desc">
                    リスニング・瞬間英作文・スピード訓練。<br>
                    徹底的なリピートで英語脳を作る。
                </p>
                <div class="btn-enter">START TRAINING</div>
            </a>

            <a href="english-reader/index.html" class="tool-card english-reader">
                <span class="tool-icon">📚</span>
                <h2 class="tool-title">English Reader</h2>
                <p class="tool-desc">
                    CSVから文章を読み込み、<br>
                    自分のペースでリスニング練習。
                </p>
                <div class="btn-enter">START READING</div>
            </a>
        </div>

        <footer>
            &copy; 2026 English Learning Hub. Advanced Repetition System.
        </footer>
    </div>
</body>
</html>

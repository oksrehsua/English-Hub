<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Reader</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header style="margin-bottom: 2rem; text-align: center; position: relative;">
            <div style="text-align: left; margin-bottom: 1rem;">
                <a href="../index.html" class="back-link">🏠 HOME に戻る</a>
            </div>
            <h1>English Reader Pro</h1>
            <p style="color: var(--text-secondary);">CSVを読み込んで英語リスニング練習</p>
        </header>

        <div class="file-input-wrapper">
            <label for="csv-upload" class="custom-file-upload">
                CSVを読み込む
            </label>
            <input type="file" id="csv-upload" accept=".csv">
        </div>

        <div class="controls-bar">
            <div class="voice-controls">
                <span class="label">Voice</span>
                <select id="voice-select" class="btn-secondary"></select>
            </div>

            <div class="speed-controls">
                <span class="label">Speed</span>
                <button class="btn-speed" data-speed="0.25">0.25</button>
                <button class="btn-speed" data-speed="0.5">0.5</button>
                <button class="btn-speed" data-speed="0.75">0.75</button>
                <button class="btn-speed active" data-speed="1">1.0</button>
            </div>

            <div class="global-actions">
                <button id="btn-toggle-translation" class="btn-secondary">和訳を表示</button>
                <button id="btn-all-play" class="btn-primary" disabled>ALL再生</button>
                <button id="btn-stop" class="btn-secondary" disabled>停止</button>
            </div>
        </div>

        <div id="content-list" class="content-list">
            <div class="empty-state">
                CSVファイルをアップロードしてください
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>

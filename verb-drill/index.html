<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verb Drill</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
</head>

<body>
    <div class="app-container">
        <header>
            <a href="../index.html" class="back-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                Hub
            </a>
            <h1>Verb Drill</h1>
        </header>

        <div id="screen-setup" class="panel">
            <div class="settings-panel">
                <label for="csv-file-input" class="file-label">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"></path></svg>
                    CSVをインポート
                </label>
                <input type="file" id="csv-file-input" accept=".csv" />
                <span id="file-name-display">verbs.csv (デフォルト)</span>
            </div>

            <div style="margin-top: 15px; margin-bottom: 20px;">
                <p style="margin: 0 0 5px 0; font-weight: 600;">進捗データ（任意）:</p>
                <div style="display: flex; gap: 8px; flex-wrap: wrap; align-items: center;">
                    <button onclick="loadProgressFromFile()" class="btn-secondary"
                        style="margin: 0; padding: 8px 16px; font-size: 0.9rem;">
                        進捗ファイルを開く
                    </button>
                    <button onclick="exportProgressCSVManual()" class="btn-secondary"
                        style="margin: 0; padding: 8px 16px; font-size: 0.9rem;">保存</button>
                    <button onclick="clearProgressData()" class="btn-secondary"
                        style="margin: 0; padding: 8px 16px; font-size: 0.9rem; color: var(--danger); border-color: #fca5a5;">クリア</button>
                    <button onclick="showDashboard()" id="dashboard-btn" class="btn-secondary"
                        style="margin: 0; padding: 8px 16px; font-size: 0.9rem; background: var(--primary); color: white; display: none; border-color: var(--primary);">成績ダッシュボード</button>
                </div>
                <div id="progress-loaded-indicator"
                    style="display: none; margin-top: 10px; font-weight: 600; color: var(--success); font-size: 0.9rem;">
                </div>
            </div>

            <div class="drill-card setup-card">
                <h2 class="setup-title">ドリル設定</h2>
                <p class="total-info">収録問題数: <span id="total-questions">--</span> 問</p>

                <div class="input-row">
                    <label>出題数:</label>
                    <input type="number" id="question-count" value="10" min="1">
                </div>

                <button id="btn-start" class="btn-primary">ドリル開始！</button>
            </div>
        </div>

        <main id="screen-drill" class="drill-card" style="display: none;">
            <div class="progress-info">
                <span id="question-progress">問題 1 / 10</span>
            </div>
            <div id="progress-info-area" style="margin-bottom: 8px; min-height: 20px;"></div>
            <h2 id="japanese-word" class="japanese-word">読み込み中...</h2>

            <div class="inputs-grid">
                <div class="input-group">
                    <label>Present（現在形）</label>
                    <input type="text" id="input-present" autocomplete="off">
                    <div class="feedback" id="feedback-present"></div>
                </div>

                <div class="input-group">
                    <label>Present Participle（-ing形）</label>
                    <input type="text" id="input-present_participle" autocomplete="off">
                    <div class="feedback" id="feedback-present_participle"></div>
                </div>

                <div class="input-group">
                    <label>Past（過去形）</label>
                    <input type="text" id="input-past" autocomplete="off">
                    <div class="feedback" id="feedback-past"></div>
                </div>

                <div class="input-group">
                    <label>Past Participle（過去分詞）</label>
                    <input type="text" id="input-past_participle" autocomplete="off">
                    <div class="feedback" id="feedback-past_participle"></div>
                </div>
            </div>

            <div class="controls">
                <button id="btn-skip">Skip</button>
            </div>
        </main>

        <div id="screen-result" class="drill-card result-card" style="display: none;">
            <h2 class="result-title">結果発表</h2>
            <div class="score-display">
                <span id="score-correct">0</span> / <span id="score-total">0</span> 正解！
            </div>

            <div id="mistakes-container" style="display: none;">
                <h3 class="mistakes-title">間違えた問題</h3>
                <ul id="mistakes-list" class="mistakes-list"></ul>
                <button id="btn-retry-mistakes" class="btn-primary">間違えた問題だけ再挑戦</button>
            </div>

            <button id="btn-back-home" class="btn-secondary">最初から設定する</button>
        </div>
    </div>

    <!-- ダッシュボードモーダル -->
    <div id="dashboard-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; padding: 20px;">
        <div style="background: #1e2128; border-radius: 12px; border: 1px solid #2d3340; padding: 24px; max-width: 900px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative; color: #e2e8f0; font-family: 'Inter', sans-serif;">
            <button onclick="closeDashboard()" style="position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #94a3b8; padding: 0; margin: 0; box-shadow: none; transition: color 0.2s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#94a3b8'">&times;</button>
            <h2 style="margin-top: 0; margin-bottom: 5px; color: #ffffff; text-align: center; font-weight: 800; letter-spacing: 1px;">TASK ANALYSIS</h2>
            <p id="last-learning-date" style="text-align: center; color: #94a3b8; font-size: 0.9rem; margin-top: 0; margin-bottom: 24px;"></p>
            
            <div style="display: grid; grid-template-columns: 1fr; gap: 24px;">
                <div style="background: #2a2f3a; padding: 20px; border-radius: 12px; border: 1px solid #374151; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                    <div style="position: relative;">
                        <h3 style="text-align: left; margin-top: 0; font-size: 1.1rem; color: #ffffff; font-weight: 500;">全体の習熟度</h3>
                    </div>
                    <div style="position: relative; height: 300px; width: 100%; margin-top: 16px;">
                        <canvas id="mastery-chart"></canvas>
                    </div>
                </div>
            </div>
            
            <div style="text-align: center; margin-top: 24px;">
                <button onclick="closeDashboard()" style="padding: 10px 32px; background: #374151; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: background 0.2s;" onmouseover="this.style.background='#4b5563'" onmouseout="this.style.background='#374151'">閉じる</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/diff_match_patch/20121119/diff_match_patch.js"></script>
    <script src="../shared/hub-core.js"></script>
    <script src="../shared/progress-manager.js"></script>
    <script src="app.js"></script>
</body>

</html>

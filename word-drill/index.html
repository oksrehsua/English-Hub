<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Word Drill</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <a href="../index.html" class="back-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg> Hub
            </a>
            <h1>Word Drill</h1>
        </header>

        <div id="screen-setup" class="panel">
            <div id="resume-card" class="resume-card" style="display: none;">
                <div class="resume-card-header">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="5 3 19 12 5 21 5 3"></polygon>
                    </svg>
                    <span>前回の中断データがあります</span>
                </div>
                <p id="resume-card-detail" class="resume-card-detail"></p>
                <div class="resume-card-actions">
                    <button id="resume-btn" onclick="resumeQuiz()" class="btn-primary">前回中断時点から再開</button>
                    <button onclick="deleteSuspendData()" class="btn-secondary" style="border-color: #fca5a5; color: var(--danger);">中断データを削除</button>
                </div>
            </div>

            <div class="settings-panel">
                <label for="csv-file-input" class="file-label">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"></path></svg> CSVをインポート
                </label>
                <input type="file" id="csv-file-input" accept=".csv" />
                <span id="file-name-display">英単語.csv (デフォルト)</span>
            </div>

            <div style="margin-top: 15px; margin-bottom: 20px;">
                <p style="margin: 0 0 5px 0; font-weight: 600;">進捗データ（任意）:</p>
                <p style="margin: 0 0 10px 0; font-size: 0.85rem; color: var(--text-gray);">
                    読み込んだファイルにそのまま上書き保存されます。苦手問題が優先出題されます。
                </p>
                <div style="display: flex; gap: 8px; flex-wrap: wrap; align-items: center;">
                    <button onclick="loadProgressFromFile()" class="btn-secondary"
                        style="margin: 0; padding: 8px 16px; font-size: 0.9rem;">
                        進捗ファイルを開く
                    </button>
                    <input type="file" id="progress-csv-file" accept=".csv" style="display: none;">
                    <button onclick="exportProgressCSVManual()" class="btn-secondary"
                        style="margin: 0; padding: 8px 16px; font-size: 0.9rem;">保存</button>
                    <button onclick="clearProgressData()" class="btn-secondary"
                        style="margin: 0; padding: 8px 16px; font-size: 0.9rem; color: var(--danger); border-color: #fca5a5;">クリア</button>
                    <button onclick="showDashboard()" id="dashboard-btn" class="btn-secondary"
                        style="margin: 0; padding: 8px 16px; font-size: 0.9rem; background: var(--primary); color: white; display: none; border-color: var(--primary);">成績ダッシュボード</button>
                </div>
                <div id="progress-loaded-indicator"
                    style="display: none; margin-top: 10px; font-weight: 600; color: var(--success); font-size: 0.9rem;">
                </div>
            </div>

            <div class="drill-card setup-card">
                <h2 class="setup-title">ドリル設定</h2>
                <p class="total-info">収録問題数: <span id="total-questions">--</span> 問</p>

                <div class="unit-selection-container">
                    <div class="unit-selection-header">
                        <label>単元を選択してください:</label>
                        <div class="unit-buttons">
                            <button type="button" id="btn-select-all-units" class="btn-small">すべて選択</button>
                            <button type="button" id="btn-deselect-all-units" class="btn-small">すべて外す</button>
                        </div>
                    </div>
                    <div id="unit-checkboxes" class="checkbox-grid">
                        <!-- Checkboxes will be dynamically inserted here -->
                    </div>
                </div>

                <div class="input-row">
                    <label>音声:</label>
                    <select id="voice-select">
                        <option value="random">ランダム (US)</option>
                    </select>
                </div>

                <div class="input-row">
                    <label>出題数:</label>
                    <input type="number" id="question-count" value="" min="1" placeholder="空白で全問">
                </div>

                <button id="btn-start" class="btn-primary">ドリル開始！</button>
            </div>
        </div>

        <main id="screen-drill" class="drill-card" style="display: none;">
            <div class="progress-info">
                <span id="question-progress">問題 1 / 10</span>
            </div>
            
            <div id="question-tags" class="question-tags"></div>
            <h2 id="question-text" class="question-text">読み込み中...</h2>

            <div id="inputs-container" class="inputs-grid single-input">
                <!-- Dynamically generated inputs go here -->
            </div>

            <div id="explanation-container" class="explanation-container">
                <div id="explanation-placeholder" class="explanation-placeholder">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
                    <span>正解するとここに解説が表示されます</span>
                </div>
                <div id="explanation-content" style="display: none; width: 100%;">
                    <p id="explanation-text" class="explanation-text"></p>
                    <p id="full-sentence-text" class="full-sentence-text"></p>
                    <div id="play-buttons-container" style="display: flex; gap: 10px; margin-top: 15px; margin-bottom: 20px; flex-wrap: wrap; justify-content: flex-start;"></div>
                </div>
            </div>

            <div class="controls" id="drill-controls" style="display: flex; gap: 10px; flex-wrap: wrap; align-items: center; justify-content: center; margin-top: 24px;">
                <button id="btn-skip">Skip</button>
                <button id="btn-next" class="btn-primary" style="display: none;">Next</button>
                
                <div style="width: 100%; height: 1px; background: var(--border); margin: 15px 0;"></div>
                
                <button onclick="suspendQuiz()" class="btn-secondary" style="margin-top: 0; display: flex; align-items: center; gap: 5px; font-size: 0.95rem; padding: 10px 20px;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="6" y="4" width="4" height="16"></rect>
                        <rect x="14" y="4" width="4" height="16"></rect>
                    </svg>
                    一時中断して保存
                </button>
            </div>
        </main>

        <div id="screen-result" class="drill-card result-card" style="display: none;">
            <h2 class="result-title">結果発表</h2>
            <div class="score-display">
                <span id="score-correct">0</span> / <span id="score-total">0</span> 正解！
            </div>

            <div id="mistakes-container" style="display: none;">
                <h3 class="mistakes-title">間違えた問題</h3>
                <ul id="mistakes-list" class="mistakes-list"></ul>
                <button id="btn-retry-mistakes" class="btn-primary">間違えた問題だけ再挑戦</button>
            </div>

            <button id="btn-back-home" class="btn-secondary">最初から設定する</button>
        </div>
    </div>

    <!-- ダッシュボードモーダル -->
    <div id="dashboard-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; padding: 20px;">
        <div style="background: white; border-radius: 16px; padding: 24px; max-width: 800px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative;">
            <button onclick="closeDashboard()" style="position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #666; padding: 0; margin: 0; box-shadow: none;">&times;</button>
            <h2 style="margin-top: 0; margin-bottom: 5px; color: var(--primary); text-align: center;">📊 学習ダッシュボード</h2>
            <p id="last-learning-date" style="text-align: center; color: var(--text-gray); font-size: 0.9rem; margin-top: 0; margin-bottom: 20px;"></p>
            
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px;">
                <div style="background: var(--bg-color); padding: 16px; border-radius: 12px; border: 1px solid var(--border);">
                    <h3 style="text-align: center; margin-top: 0; font-size: 1rem; color: #333;">全体の習熟度</h3>
                    <div style="position: relative; height: 250px; width: 100%;">
                        <canvas id="mastery-chart"></canvas>
                    </div>
                </div>
                
                <div style="background: var(--bg-color); padding: 16px; border-radius: 12px; border: 1px solid var(--border);">
                    <h3 style="text-align: center; margin-top: 0; font-size: 1rem; color: #333;">品詞別の正答率</h3>
                    <div style="position: relative; height: 250px; width: 100%;">
                        <canvas id="accuracy-chart"></canvas>
                    </div>
                </div>
            </div>
            
            <div style="text-align: center; margin-top: 24px;">
                <button onclick="closeDashboard()" class="btn-secondary" style="margin: 0; background: var(--bg-color);">閉じる</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/diff_match_patch/20121119/diff_match_patch.js"></script>
    <script src="../hub-core.js"></script>
    <script src="../progress-manager.js"></script>
    <script src="app.js"></script>
</body>
</html>
